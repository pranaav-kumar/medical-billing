name: 🚀 Build & Deploy — Medical Billing App

on:
  push:
    branches:
      - main
  workflow_dispatch:

# ─── GLOBAL ENVIRONMENT ───────────────────────────────────────────────────────
env:
  ACR_REGISTRY:       medicalbilling.azurecr.io
  BACKEND_IMAGE:      medical-backend
  FRONTEND_IMAGE:     medical-frontend
  RESOURCE_GROUP:     medical-rg-demo
  BACKEND_APP_NAME:   cloud-cye5c7dnb8gmh8bw
  FRONTEND_APP_NAME:  cloud-front-gqhmgjfwe0ckhtdu

# ─── JOBS ─────────────────────────────────────────────────────────────────────
jobs:

  # ═══════════════════════════════════════════════════════════════════════════
  # JOB 1 — Build Docker images and push to ACR
  # ═══════════════════════════════════════════════════════════════════════════
  build-and-push:
    name: 🐳 Build & Push Images to ACR
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout source code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Set up Docker Buildx for efficient multi-layer caching
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 3. Log in to Azure Container Registry using ACR admin credentials
      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      # 4. Build backend image
      - name: Build and push backend Docker image
        uses: docker/build-push-action@v5
        with:
          context:    ./backend
          file:       ./backend/Dockerfile
          push:       true
          tags:       ${{ env.ACR_REGISTRY }}/${{ env.BACKEND_IMAGE }}:latest
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      # 5. Build frontend image
      - name: Build and push frontend Docker image
        uses: docker/build-push-action@v5
        with:
          context:    ./vite-frontend
          file:       ./vite-frontend/Dockerfile
          push:       true
          tags:       ${{ env.ACR_REGISTRY }}/${{ env.FRONTEND_IMAGE }}:latest
          cache-from: type=gha
          cache-to:   type=gha,mode=max
