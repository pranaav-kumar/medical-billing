name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout code
        uses: actions/checkout@v3

      # 2. Login to Azure Container Registry
      - name: Login to ACR
        uses: azure/docker-login@v1
        with:
          login-server: medicalbilling.azurecr.io
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      # 3. Build Backend Image
      - name: Build Backend Docker Image
        run: |
          docker build -t medicalbilling.azurecr.io/medical-backend:latest ./backend

      # 4. Push Backend Image
      - name: Push Backend Image
        run: |
          docker push medicalbilling.azurecr.io/medical-backend:latest

      # 5. Build Frontend Image
      - name: Build Frontend Docker Image
        run: |
          docker build -t medicalbilling.azurecr.io/medical-frontend:latest ./vite-frontend

      # 6. Push Frontend Image
      - name: Push Frontend Image
        run: |
          docker push medicalbilling.azurecr.io/medical-frontend:latest

      # 7. Deploy Backend to Azure Web App
      - name: Deploy Backend Container
        uses: azure/webapps-deploy@v2
        with:
          app-name: cloud
          images: medicalbilling.azurecr.io/medical-backend:latest

      # 8. Deploy Frontend Container
      - name: Deploy Frontend Container
        uses: azure/webapps-deploy@v2
        with:
          app-name: cloud-front
          images: medicalbilling.azurecr.io/medical-frontend:latest