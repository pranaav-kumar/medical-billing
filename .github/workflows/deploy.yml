name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout
      - name: Checkout code
        uses: actions/checkout@v3

      # 2. Login to Azure (THIS MUST COME BEFORE DEPLOY)
      - name: Login to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # 3. Login to ACR
      - name: Login to ACR
        uses: azure/docker-login@v1
        with:
          login-server: medicalbilling.azurecr.io
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      # 4. Build backend
      - name: Build Backend Docker Image
        run: docker build -t medicalbilling.azurecr.io/medical-backend:latest ./backend

      # 5. Push backend
      - name: Push Backend Image
        run: docker push medicalbilling.azurecr.io/medical-backend:latest

      # 6. Build frontend
      - name: Build Frontend Docker Image
        run: docker build -t medicalbilling.azurecr.io/medical-frontend:latest ./vite-frontend

      # 7. Push frontend
      - name: Push Frontend Image
        run: docker push medicalbilling.azurecr.io/medical-frontend:latest

      # 8. Deploy backend
      - name: Deploy Backend Container
        uses: azure/webapps-deploy@v2
        with:
          app-name: cloud
          images: medicalbilling.azurecr.io/medical-backend:latest

      # 9. Deploy frontend
      - name: Deploy Frontend Container
        uses: azure/webapps-deploy@v2
        with:
          app-name: cloud-front
          images: medicalbilling.azurecr.io/medical-frontend:latest