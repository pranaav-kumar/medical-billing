name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout
      - name: Checkout code
        uses: actions/checkout@v3

      # 2. Set unique image tag using run number + 10
      - name: Set image tag
        run: echo "IMAGE_TAG=v$(( ${{ github.run_number }} + 20 ))" >> $GITHUB_ENV

      # 3. Login to Azure
      - name: Login to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # 4. Login to ACR
      - name: Login to ACR
        uses: azure/docker-login@v1
        with:
          login-server: medicalbilling.azurecr.io
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      # 5. Build backend
      - name: Build Backend Docker Image
        run: docker build -t medicalbilling.azurecr.io/medical-backend:${{ env.IMAGE_TAG }} ./backend

      # 6. Push backend
      - name: Push Backend Image
        run: docker push medicalbilling.azurecr.io/medical-backend:${{ env.IMAGE_TAG }}

      # 7. Deploy backend
      - name: Deploy Backend Container
        uses: azure/webapps-deploy@v2
        with:
          app-name: cloud
          images: medicalbilling.azurecr.io/medical-backend:${{ env.IMAGE_TAG }}

      # 8. Wait for backend to stabilize before deploying frontend
      - name: Wait for backend to stabilize
        run: sleep 30

      # 9. Build frontend
      - name: Build Frontend Docker Image
        run: docker build -t medicalbilling.azurecr.io/medical-frontend:${{ env.IMAGE_TAG }} ./vite-frontend

      # 10. Push frontend
      - name: Push Frontend Image
        run: docker push medicalbilling.azurecr.io/medical-frontend:${{ env.IMAGE_TAG }}

      # 11. Deploy frontend
      - name: Deploy Frontend Container
        uses: azure/webapps-deploy@v2
        with:
          app-name: cloud-front
          images: medicalbilling.azurecr.io/medical-frontend:${{ env.IMAGE_TAG }}