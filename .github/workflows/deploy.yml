name: 🚀 Build & Deploy — Medical Billing App

on:
  push:
    branches:
      - main
  workflow_dispatch:

# ─── GLOBAL ENVIRONMENT ───────────────────────────────────────────────────────
env:
  ACR_REGISTRY:       medicalbilling.azurecr.io
  BACKEND_IMAGE:      medical-backend
  FRONTEND_IMAGE:     medical-frontend
  RESOURCE_GROUP:     medical-rg-demo
  BACKEND_APP_NAME:   cloud-cye5c7dnb8gmh8bw
  FRONTEND_APP_NAME:  cloud-front-gqhmgjfwe0ckhtdu

# ─── JOBS ─────────────────────────────────────────────────────────────────────
jobs:

  # ═══════════════════════════════════════════════════════════════════════════
  # JOB 1 — Build Docker images and push to ACR
  # ═══════════════════════════════════════════════════════════════════════════
  build-and-push:
    name: 🐳 Build & Push Images to ACR
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout source code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Set up Docker Buildx for efficient multi-layer caching
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 3. Log in to Azure Container Registry using ACR admin credentials
      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      # 4. Build backend image (context = ./backend, entry = server.js on port 8080)
      - name: Build and push backend Docker image
        uses: docker/build-push-action@v5
        with:
          context:    ./backend
          file:       ./backend/Dockerfile
          push:       true
          tags:       ${{ env.ACR_REGISTRY }}/${{ env.BACKEND_IMAGE }}:latest
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      # 5. Build frontend image (Vite build → serve static on port 8080)
      - name: Build and push frontend Docker image
        uses: docker/build-push-action@v5
        with:
          context:    ./vite-frontend
          file:       ./vite-frontend/Dockerfile
          push:       true
          tags:       ${{ env.ACR_REGISTRY }}/${{ env.FRONTEND_IMAGE }}:latest
          cache-from: type=gha
          cache-to:   type=gha,mode=max

  # ═══════════════════════════════════════════════════════════════════════════
  # JOB 2 — Deploy both images to Azure App Services
  # ═══════════════════════════════════════════════════════════════════════════
  deploy:
    name: ☁️ Deploy to Azure App Services
    runs-on: ubuntu-latest
    needs: build-and-push   # waits for successful image push

    steps:
      # 1. Authenticate with Azure via Service Principal
      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # 2. Deploy backend container — pulls medical-backend:latest from ACR
      - name: Deploy backend to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.BACKEND_APP_NAME }}
          images:   ${{ env.ACR_REGISTRY }}/${{ env.BACKEND_IMAGE }}:latest

      # 3. Deploy frontend container — pulls medical-frontend:latest from ACR
      - name: Deploy frontend to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.FRONTEND_APP_NAME }}
          images:   ${{ env.ACR_REGISTRY }}/${{ env.FRONTEND_IMAGE }}:latest

      # 4. Summary
      - name: Deployment summary
        run: |
          echo "✅ Backend deployed:  https://cloud-cye5c7dnb8gmh8bw.southeastasia-01.azurewebsites.net"
          echo "✅ Frontend deployed: https://cloud-front-gqhmgjfwe0ckhtdu.southeastasia-01.azurewebsites.net"
